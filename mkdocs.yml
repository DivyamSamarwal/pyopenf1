site_name: pyopenf1
site_description: A production-grade, asynchronous Python wrapper for the OpenF1 API.
site_url: https://DivyamSamarwal.github.io/pyopenf1
repo_url: https://github.com/DivyamSamarwal/pyopenf1
repo_name: DivyamSamarwal/pyopenf1

theme:
  name: material
  palette:
    - scheme: slate
      primary: red
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: red
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Data Science (Pandas): pandas.md
  - Advanced Usage: advanced.md
  - CLI: cli.md
  - API Reference:
      - Client: api/client.md
      - Models: api/models.md
      - Exceptions: api/exceptions.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
